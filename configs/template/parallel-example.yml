# Reference YAML for the parallel execution model. See docs/reference/parallel-execution.md
# for the full design and authoring guidance.
#
# This file is documentation-only; it lives under configs/template so it
# isn't picked up by the loader (which scans configs/{tasks,flows,...}).

tasks:
  - name: fetch_user
    logic: fetch_user

  - name: fetch_profile
    logic: fetch_profile

  - name: score_profile
    logic: score_profile

  - name: fetch_activity
    logic: fetch_activity

  - name: score_activity
    logic: score_activity

  - name: combine_scores
    logic: combine_scores

flows:
  - name: enrich_user
    description: Fetch a user, run profile/activity enrichment in parallel, then combine.
    tasks:
      - name: fetch_user
        bind:
          out:
            user_id: user_id
      - parallel:
          on_branch_failure: continue   # "continue" (default) | "cancel"
          branches:
            - label: profile
              tasks:
                - name: fetch_profile
                  bind:
                    in:
                      user_id: user_id
                    out:
                      profile: profile
                - name: score_profile
                  bind:
                    in:
                      profile: profile
            - label: activity
              tasks:
                - name: fetch_activity
                  bind:
                    in:
                      user_id: user_id
                    out:
                      activity: activity
                - name: score_activity
                  bind:
                    in:
                      activity: activity
      - name: combine_scores
        bind:
          in:
            profile_score: profile.score
            profile_confidence: profile.confidence
            activity_score: activity.score
            activity_confidence: activity.confidence
