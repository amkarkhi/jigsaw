endpoints:
  - name: search
    path: /api/search
    method: POST
    description: "Main search endpoint with multiple flow options"
    flows:
      - sub: 1
        flow_name: basic_search
      - sub: 2
        flow_name: cached_search
      - sub: 3
        flow_name: advanced_search
      - sub: 4
        flow_name: parallel_search
    metadata:
      rate_limit: 100
      timeout: 30000

  - name: health
    path: /api/health
    method: GET
    description: "Health check endpoint"
    flows:
      - sub: 1
        flow_name: basic_search
    metadata:
      public: true
