providers:
  - name: cache
    type: cache
    version: "1.0.0"
    config:
      host: localhost
      port: 6379
      db: 0
      password: ""
      max_retries: 3
      pool_timeout: 5000
    init_mode: pooled
    pool_size: 10
    metadata:
      description: "Main cache instance"
      cluster: "production"
