flows:
  - name: nested_search
    description: "Generic `cache` task wrapping `search`, wired at the flow level."
    version: "0.1.0"
    tasks:
      # The flow chooses what to wrap: `nested.task: search`. Same `cache`
      # task could wrap any other task from a different flow.
      - name: cache
        nested:
          task: search
        params:
          keys: [query]
          ttl: 120s
        bind:
          in:
            query: query
          out:
            results: search_results
    metadata:
      author: "jigsaw-team"
