<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab {
            background: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .tab.active {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 500px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .list-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .list-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .list-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .list-item p {
            color: #666;
            margin-bottom: 5px;
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-right: 10px;
        }

        .badge-success {
            background: #10b981;
            color: white;
        }

        .badge-warning {
            background: #f59e0b;
            color: white;
        }

        .badge-info {
            background: #3b82f6;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.2em;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-ok {
            background: #10b981;
        }

        .status-warning {
            background: #f59e0b;
        }

        .status-error {
            background: #ef4444;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧩 Jigsaw Configuration Manager</h1>
            <p>Manage your workflow orchestration configuration</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('overview')">📊 Overview</button>
            <button class="tab" onclick="showTab('flows')">📋 Flows</button>
            <button class="tab" onclick="showTab('tasks')">⚙️ Tasks</button>
            <button class="tab" onclick="showTab('providers')">🔌 Providers</button>
            <button class="tab" onclick="showTab('endpoints')">🌐 Endpoints</button>
            <button class="tab" onclick="showTab('logic')">🔧 Logic Registry</button>
        </div>

        <div class="content">
            <div id="overview" class="tab-content">
                <div class="loading">Loading...</div>
            </div>
            <div id="flows" class="tab-content" style="display:none;">
                <div class="loading">Loading...</div>
            </div>
            <div id="tasks" class="tab-content" style="display:none;">
                <div class="loading">Loading...</div>
            </div>
            <div id="providers" class="tab-content" style="display:none;">
                <div class="loading">Loading...</div>
            </div>
            <div id="endpoints" class="tab-content" style="display:none;">
                <div class="loading">Loading...</div>
            </div>
            <div id="logic" class="tab-content" style="display:none;">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'overview';

        function showTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.style.display = 'none';
            });
            document.getElementById(tabName).style.display = 'block';

            currentTab = tabName;
            loadTabData(tabName);
        }

        async function loadTabData(tabName) {
            try {
                switch(tabName) {
                    case 'overview':
                        await loadOverview();
                        break;
                    case 'flows':
                        await loadFlows();
                        break;
                    case 'tasks':
                        await loadTasks();
                        break;
                    case 'providers':
                        await loadProviders();
                        break;
                    case 'endpoints':
                        await loadEndpoints();
                        break;
                    case 'logic':
                        await loadLogicRegistry();
                        break;
                }
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        async function loadOverview() {
            const response = await fetch('/api/overview');
            const data = await response.json();

            const html = `
                <h2 style="margin-bottom: 20px; color: #667eea;">Configuration Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>${data.flows}</h3>
                        <p>Flows</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.tasks}</h3>
                        <p>Tasks</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.providers}</h3>
                        <p>Providers</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.endpoints}</h3>
                        <p>Endpoints</p>
                    </div>
                    <div class="stat-card">
                        <h3>${data.logic_handlers}</h3>
                        <p>Logic Handlers</p>
                    </div>
                </div>

                <h3 style="margin: 30px 0 20px; color: #667eea;">Status</h3>
                <div class="list-item">
                    <p>
                        <span class="status-indicator ${data.has_flows ? 'status-ok' : 'status-warning'}"></span>
                        ${data.has_flows ? '✓' : '⚠️'} Flows: ${data.has_flows ? 'Configured' : 'Not configured'}
                    </p>
                    <p>
                        <span class="status-indicator ${data.has_tasks ? 'status-ok' : 'status-warning'}"></span>
                        ${data.has_tasks ? '✓' : '⚠️'} Tasks: ${data.has_tasks ? 'Configured' : 'Not configured'}
                    </p>
                    <p>
                        <span class="status-indicator ${data.has_logic ? 'status-ok' : 'status-warning'}"></span>
                        ${data.has_logic ? '✓' : '⚠️'} Logic Handlers: ${data.has_logic ? 'Registered' : 'Not registered'}
                    </p>
                    <p>
                        <span class="status-indicator ${data.all_logic_implemented ? 'status-ok' : 'status-warning'}"></span>
                        ${data.all_logic_implemented ? '✓' : '⚠️'} Logic Implementation: ${data.all_logic_implemented ? 'Complete' : `${data.unimplemented_logic} unimplemented`}
                    </p>
                </div>
            `;

            document.getElementById('overview').innerHTML = html;
        }

        async function loadFlows() {
            const response = await fetch('/api/flows');
            const flows = await response.json();

            let html = `<h2 style="margin-bottom: 20px; color: #667eea;">Flows (${flows.length})</h2>`;

            flows.forEach(flow => {
                html += `
                    <div class="list-item">
                        <h3>${flow.name}</h3>
                        <p>${flow.description || 'No description'}</p>
                        <p>
                            <span class="badge badge-info">${flow.task_count} tasks</span>
                            ${flow.inherits ? `<span class="badge badge-warning">Inherits: ${flow.inherits}</span>` : ''}
                        </p>
                    </div>
                `;
            });

            document.getElementById('flows').innerHTML = html;
        }

        async function loadTasks() {
            const response = await fetch('/api/tasks');
            const tasks = await response.json();

            let html = `<h2 style="margin-bottom: 20px; color: #667eea;">Tasks (${tasks.length})</h2>`;

            tasks.forEach(task => {
                html += `
                    <div class="list-item">
                        <h3>${task.name}</h3>
                        <p>${task.description || 'No description'}</p>
                        <p>
                            <span class="badge ${task.logic_implemented ? 'badge-success' : 'badge-warning'}">
                                ${task.logic_implemented ? '✓' : '⚠️'} Logic: ${task.logic}
                            </span>
                            ${task.provider ? `<span class="badge badge-info">Provider: ${task.provider}</span>` : ''}
                            <span class="badge badge-info">${task.input_count} inputs, ${task.output_count} outputs</span>
                            ${task.inherits ? `<span class="badge badge-warning">Inherits: ${task.inherits}</span>` : ''}
                        </p>
                    </div>
                `;
            });

            document.getElementById('tasks').innerHTML = html;
        }

        async function loadProviders() {
            const response = await fetch('/api/providers');
            const providers = await response.json();

            let html = `<h2 style="margin-bottom: 20px; color: #667eea;">Providers (${providers.length})</h2>`;

            providers.forEach(provider => {
                html += `
                    <div class="list-item">
                        <h3>${provider.name}</h3>
                        <p>
                            <span class="badge badge-info">Type: ${provider.type}</span>
                            <span class="badge badge-info">Mode: ${provider.init_mode}</span>
                            ${provider.pool_size > 0 ? `<span class="badge badge-info">Pool: ${provider.pool_size}</span>` : ''}
                        </p>
                    </div>
                `;
            });

            document.getElementById('providers').innerHTML = html;
        }

        async function loadEndpoints() {
            const response = await fetch('/api/endpoints');
            const endpoints = await response.json();

            let html = `<h2 style="margin-bottom: 20px; color: #667eea;">Endpoints (${endpoints.length})</h2>`;

            endpoints.forEach(endpoint => {
                html += `
                    <div class="list-item">
                        <h3>${endpoint.name}</h3>
                        <p><strong>${endpoint.method}</strong> ${endpoint.path}</p>
                        <p>${endpoint.description || 'No description'}</p>
                        <p><strong>Flow Mappings:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            ${endpoint.mappings.map(m => `<li>sub=${m.sub} → ${m.flow}</li>`).join('')}
                        </ul>
                    </div>
                `;
            });

            document.getElementById('endpoints').innerHTML = html;
        }

        async function loadLogicRegistry() {
            const response = await fetch('/api/logic');
            const handlers = await response.json();

            let html = `<h2 style="margin-bottom: 20px; color: #667eea;">Logic Registry (${handlers.length})</h2>`;

            if (handlers.length === 0) {
                html += `
                    <div class="list-item">
                        <p>No logic handlers registered yet.</p>
                        <p style="margin-top: 10px;">Register handlers in your application code:</p>
                        <pre style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-top: 10px;">eng.MustRegisterLogic("handler_name", yourFunction)</pre>
                    </div>
                `;
            } else {
                handlers.forEach(handler => {
                    html += `
                        <div class="list-item">
                            <h3>
                                ${handler.implemented ? '<span class="badge badge-success">✓</span>' : '<span class="badge badge-warning">⚠️</span>'}
                                ${handler.name}
                            </h3>
                            <p>
                                ${handler.implemented ? 'Implemented' : 'Not implemented'}
                                ${handler.used_by.length > 0 ? ` • Used by: ${handler.used_by.join(', ')}` : ''}
                            </p>
                        </div>
                    `;
                });
            }

            document.getElementById('logic').innerHTML = html;
        }

        // Load initial data
        loadOverview();

        // Auto-refresh every 5 seconds
        setInterval(() => {
            loadTabData(currentTab);
        }, 5000);
    </script>
</body>
</html>
